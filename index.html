<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeece8;
      --text: #1a1a19;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --purple-bg: #eeedfe;
      --purple-border: #afa9ec;
      --purple-text: #3c3489;
      --purple-strong: #534ab7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2c2c2a;
        --bg-tertiary: #242422;
        --text: #f1efe8;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.25);
        --purple-bg: #26215c;
        --purple-border: #534ab7;
        --purple-text: #cecbf6;
        --purple-strong: #afa9ec;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100dvh;
      padding: 1.5rem 1rem 3rem;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 i { font-size: 24px; color: var(--purple-strong); }

    .add-area {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .add-area input {
      flex: 1;
      height: 44px;
      padding: 0 14px;
      font-size: 15px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    .add-area input:focus {
      border-color: var(--purple-strong);
      box-shadow: 0 0 0 3px rgba(83,74,183,0.2);
    }

    .btn-add {
      height: 44px;
      padding: 0 16px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .btn-add:hover { background: var(--bg-secondary); }
    .btn-add:active { transform: scale(0.98); }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .filter-btn {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 99px;
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--purple-bg);
      border-color: var(--purple-border);
      color: var(--purple-text);
    }

    .toast {
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      background: #2c2c2a;
      color: #f1efe8;
      border-radius: var(--radius-lg);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast-msg { flex: 1; }

    .toast-undo {
      background: transparent;
      border: 0.5px solid rgba(241,239,232,0.4);
      color: #f1efe8;
      border-radius: var(--radius-md);
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toast-undo:hover { background: rgba(241,239,232,0.15); }

    .toast-close {
      background: transparent;
      border: none;
      color: #b4b2a9;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      padding: 0;
    }

    .toast-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: rgba(175,169,236,0.7);
      width: 100%;
      transform-origin: left;
    }

    .count {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-card.status-done { opacity: 0.55; }

    .status-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-todo   { background: #f1efe8; color: #444441; }
    .badge-doing  { background: #faeeda; color: #633806; }
    .badge-done   { background: #eaf3de; color: #27500a; }

    @media (prefers-color-scheme: dark) {
      .badge-todo  { background: #2c2c2a; color: #d3d1c7; }
      .badge-doing { background: #412402; color: #fac775; }
      .badge-done  { background: #173404; color: #c0dd97; }
    }

    .task-name {
      flex: 1;
      font-size: 15px;
      word-break: break-all;
    }

    .task-card.status-done .task-name {
      text-decoration: line-through;
      color: var(--text-tertiary);
    }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .icon-btn:hover { background: var(--bg-secondary); color: var(--text); }
    .icon-btn.advance:hover { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
    .icon-btn.del:hover { background: #fcebeb; color: #a32d2d; border-color: #f09595; }

    @media (prefers-color-scheme: dark) {
      .icon-btn.del:hover { background: #501313; color: #f7c1c1; border-color: #a32d2d; }
    }

    .empty {
      text-align: center;
      padding: 2.5rem 0;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .empty i { font-size: 32px; display: block; margin-bottom: 8px; }

    .csv-section {
      margin-bottom: 1.25rem;
    }

    .csv-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 8px;
    }

    .csv-toggle:hover { color: var(--text); }
    .csv-toggle i.arrow { transition: transform 0.2s; font-size: 14px; }
    .csv-toggle.open i.arrow { transform: rotate(90deg); }

    .csv-panel {
      display: none;
      border: 0.5px dashed var(--border-hover);
      border-radius: var(--radius-lg);
      padding: 16px;
      background: var(--bg);
    }

    .csv-panel.open { display: block; }

    .drop-zone {
      border: 0.5px dashed var(--border-hover);
      border-radius: var(--radius-md);
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 12px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: var(--bg-secondary);
      border-color: var(--purple-strong);
    }

    .drop-zone i { font-size: 28px; color: var(--text-tertiary); display: block; margin-bottom: 6px; }
    .drop-zone p { font-size: 13px; color: var(--text-secondary); }
    .drop-zone span { font-size: 12px; color: var(--text-tertiary); }

    .csv-hint {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.7;
    }

    .csv-hint code {
      display: block;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      margin-top: 6px;
      font-family: monospace;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: pre;
    }

    .csv-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-csv-dl {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-csv-dl:hover { background: var(--bg-secondary); color: var(--text); }

    #csvFile { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <h1><i class="ti ti-checkbox"></i>My Todo</h1>

    <div class="add-area">
      <input type="text" id="newTask" placeholder="新しいタスクを入力..." maxlength="80" />
      <button class="btn-add" onclick="addTask()">
        <i class="ti ti-plus"></i>追加
      </button>
    </div>

    <div class="csv-section">
      <button class="csv-toggle" id="csvToggle" onclick="toggleCsv()">
        <i class="ti ti-arrow-right arrow"></i>
        <i class="ti ti-file-upload"></i>CSVで一括登録
      </button>
      <div class="csv-panel" id="csvPanel">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <i class="ti ti-table-import"></i>
          <p>クリックまたはCSVファイルをドロップ</p>
          <span>文字コード: UTF-8</span>
        </div>
        <input type="file" id="csvFile" accept=".csv,text/csv" onchange="onFileSelect(event)" />
        <div class="csv-hint">
          書式：1列目にタスク名、2列目に状態（省略時は未着手）
          <code>タスク名,状態
会議の準備,未着手
報告書を書く,着手中
テスト完了,完了</code>
        </div>
        <div class="csv-actions">
          <button class="btn-csv-dl" onclick="downloadSample()">
            <i class="ti ti-download"></i>サンプルCSVをダウンロード
          </button>
        </div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('todo', this)">未着手</button>
      <button class="filter-btn" onclick="setFilter('doing', this)">着手中</button>
      <button class="filter-btn" onclick="setFilter('done', this)">完了</button>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">
      <span class="toast-msg" id="toastMsg"></span>
      <button class="toast-undo" onclick="undo()">
        <i class="ti ti-arrow-back-up"></i>元に戻す
      </button>
      <button class="toast-close" onclick="hideToast()" aria-label="閉じる">
        <i class="ti ti-x"></i>
      </button>
      <div class="toast-bar" id="toastBar"></div>
    </div>

    <div class="count" id="countLabel"></div>
    <div class="task-list" id="taskList"></div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('myTodos') || '[]');
    let filter = 'all';
    let lastAction = null;
    let toastTimer = null;
    let barAnim = null;

    if (tasks.length === 0) {
      tasks = [
        { id: 1, name: 'プロジェクト計画を立てる', status: 'done' },
        { id: 2, name: 'デザインレビューをする', status: 'doing' },
        { id: 3, name: 'テストを書く', status: 'todo' },
      ];
    }

    function save() { localStorage.setItem('myTodos', JSON.stringify(tasks)); }

    const STATUS_LABEL = { todo: '未着手', doing: '着手中', done: '完了' };
    const BADGE_CLASS  = { todo: 'badge-todo', doing: 'badge-doing', done: 'badge-done' };
    const NEXT_STATUS  = { todo: 'doing', doing: 'done', done: null };
    const NEXT_LABEL   = { todo: '着手中へ', doing: '完了へ', done: null };

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const filtered = filter === 'all' ? tasks : tasks.filter(t => t.status === filter);
      document.getElementById('countLabel').textContent = filtered.length + '件';
      const list = document.getElementById('taskList');

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty"><i class="ti ti-clipboard-off"></i>タスクがありません</div>';
        return;
      }

      list.innerHTML = filtered.map(t => {
        const ns = NEXT_STATUS[t.status];
        const nl = NEXT_LABEL[t.status];
        return `<div class="task-card status-${t.status}">
          <span class="status-badge ${BADGE_CLASS[t.status]}">${STATUS_LABEL[t.status]}</span>
          <span class="task-name">${escHtml(t.name)}</span>
          <div class="task-actions">
            ${ns ? `<button class="icon-btn advance" onclick="advance(${t.id})" title="${nl}" aria-label="${nl}"><i class="ti ti-circle-arrow-right"></i></button>` : ''}
            <button class="icon-btn del" onclick="del(${t.id})" title="削除" aria-label="削除"><i class="ti ti-trash"></i></button>
          </div>
        </div>`;
      }).join('');
    }

    function addTask() {
      const input = document.getElementById('newTask');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      tasks.unshift({ id: Date.now(), name, status: 'todo' });
      input.value = '';
      lastAction = null;
      hideToast();
      save(); render();
    }

    function advance(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const prev = t.status;
      const ns = NEXT_STATUS[prev];
      if (!ns) return;
      t.status = ns;
      lastAction = { type: 'advance', id, prev };
      save(); render();
      showToast(`「${t.name}」を${STATUS_LABEL[ns]}に変更しました`);
    }

    function undo() {
      if (!lastAction) return;
      if (lastAction.type === 'advance') {
        const t = tasks.find(t => t.id === lastAction.id);
        if (t) { t.status = lastAction.prev; save(); render(); }
      }
      lastAction = null;
      hideToast();
    }

    function del(id) {
      tasks = tasks.filter(t => t.id !== id);
      lastAction = null;
      hideToast();
      save(); render();
    }

    function showToast(msg) {
      clearTimeout(toastTimer);
      if (barAnim) { barAnim.cancel(); barAnim = null; }
      const toast = document.getElementById('toast');
      const bar = document.getElementById('toastBar');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      bar.style.transform = 'scaleX(1)';
      barAnim = bar.animate(
        [{ transform: 'scaleX(1)' }, { transform: 'scaleX(0)' }],
        { duration: 5000, fill: 'forwards' }
      );
      toastTimer = setTimeout(hideToast, 5000);
    }

    function hideToast() {
      clearTimeout(toastTimer);
      if (barAnim) { barAnim.cancel(); barAnim = null; }
      document.getElementById('toast').classList.remove('show');
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newTask').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    const STATUS_MAP = {
      '未着手': 'todo', 'todo': 'todo',
      '着手中': 'doing', 'doing': 'doing',
      '完了': 'done', 'done': 'done',
    };

    function toggleCsv() {
      const toggle = document.getElementById('csvToggle');
      const panel = document.getElementById('csvPanel');
      toggle.classList.toggle('open');
      panel.classList.toggle('open');
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
      const imported = [];
      const skipped = [];

      for (const line of lines) {
        const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, '').trim());
        const name = cols[0];
        if (!name || name === 'タスク名') continue;
        if (name.length > 80) { skipped.push(name); continue; }
        const rawStatus = (cols[1] || '').toLowerCase();
        const status = STATUS_MAP[cols[1]] || STATUS_MAP[rawStatus] || 'todo';
        imported.push({ id: Date.now() + Math.random(), name, status });
      }
      return { imported, skipped };
    }

    function applyImport(text) {
      const { imported, skipped } = parseCsv(text);
      if (imported.length === 0) {
        showToast('読み込めるタスクが見つかりませんでした');
        return;
      }
      tasks = [...imported.reverse(), ...tasks];
      lastAction = null;
      save(); render();
      const msg = `${imported.length}件のタスクを登録しました` +
        (skipped.length ? `（${skipped.length}件スキップ）` : '');
      showToast(msg);
      document.getElementById('csvToggle').classList.remove('open');
      document.getElementById('csvPanel').classList.remove('open');
    }

    function onFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => applyImport(ev.target.result);
      reader.readAsText(file, 'UTF-8');
      e.target.value = '';
    }

    function onDragOver(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.add('dragover');
    }

    function onDragLeave() {
      document.getElementById('dropZone').classList.remove('dragover');
    }

    function onDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => applyImport(ev.target.result);
      reader.readAsText(file, 'UTF-8');
    }

    function downloadSample() {
      const csv = 'タスク名,状態\n会議の準備,未着手\n報告書を書く,着手中\nテスト完了,完了\n';
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'todo_sample.csv';
      a.click();
    }

    render();
  </script>
</body>
</html>
